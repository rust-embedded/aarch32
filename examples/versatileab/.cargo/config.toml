[target.armv7r-none-eabihf]
runner = "qemu-system-arm -machine versatileab -cpu cortex-r5f -semihosting -nographic -audio none -kernel"

[target.thumbv7r-none-eabihf]
runner = "qemu-system-arm -machine versatileab -cpu cortex-r5f -semihosting -nographic -audio none -kernel"

[target.armv7r-none-eabi]
# change '-mcpu=cortex-r5' to '-mcpu=cortex-r5f' if you use eabi-fpu feature, otherwise
# qemu-system-arm will lock up
runner = "qemu-system-arm -machine versatileab -cpu cortex-r5 -semihosting -nographic -audio none -kernel"

[target.thumbv7r-none-eabi]
# change '-mcpu=cortex-r5' to '-mcpu=cortex-r5f' if you use eabi-fpu feature, otherwise
# qemu-system-arm will lock up
runner = "qemu-system-arm -machine versatileab -cpu cortex-r5 -semihosting -nographic -audio none -kernel"

[target.armv7a-none-eabihf]
runner = "qemu-system-arm -machine versatileab -cpu cortex-a15 -semihosting -nographic -audio none -kernel"

[target.thumbv7a-none-eabihf]
runner = "qemu-system-arm -machine versatileab -cpu cortex-a15 -semihosting -nographic -audio none -kernel"

[target.armv7a-none-eabi]
runner = "qemu-system-arm -machine versatileab -cpu cortex-a15 -semihosting -nographic -audio none -kernel"

[target.thumbv7a-none-eabi]
runner = "qemu-system-arm -machine versatileab -cpu cortex-a15 -semihosting -nographic -audio none -kernel"

[target.armv6-none-eabihf]
runner = "qemu-system-arm -machine versatileab -cpu arm1176 -semihosting -nographic -audio none -kernel"

[target.armv6-none-eabi]
runner = "qemu-system-arm -machine versatileab -cpu arm1176 -semihosting -nographic -audio none -kernel"

[target.thumbv6-none-eabi]
runner = "qemu-system-arm -machine versatileab -cpu arm1176 -semihosting -nographic -audio none -kernel"

[target.armv5te-none-eabi]
runner = "qemu-system-arm -machine versatileab -cpu arm926 -semihosting -nographic -audio none -kernel"

[target.thumbv5te-none-eabi]
runner = "qemu-system-arm -machine versatileab -cpu arm926 -semihosting -nographic -audio none -kernel"

[target.armv4t-none-eabi]
runner = "qemu-system-arm -machine versatileab -cpu arm926 -semihosting -nographic -audio none -kernel"

[target.thumbv4t-none-eabi]
runner = "qemu-system-arm -machine versatileab -cpu arm926 -semihosting -nographic -audio none -kernel"

[build]
target = "armv7r-none-eabihf"

[env]
CC_armv7r_none_eabihf = "arm-none-eabi-gcc"
CC_thumbv7r_none_eabihf = "arm-none-eabi-gcc"
CC_armv7r_none_eabi = "arm-none-eabi-gcc"
CC_thumbv7r_none_eabi = "arm-none-eabi-gcc"
CC_armv7a_none_eabihf = "arm-none-eabi-gcc"
CC_thumbv7a_none_eabihf = "arm-none-eabi-gcc"
CC_armv7a_none_eabi = "arm-none-eabi-gcc"
CC_thumbv7a_none_eabi = "arm-none-eabi-gcc"
CC_armv6_none_eabihf = "arm-none-eabi-gcc"
CC_armv6_none_eabi = "arm-none-eabi-gcc"
CC_thumbv6_none_eabi = "arm-none-eabi-gcc"
CC_armv5te_none_eabi = "arm-none-eabi-gcc"
CC_thumbv5te_none_eabi = "arm-none-eabi-gcc"
CC_armv4t_none_eabi = "arm-none-eabi-gcc"
CC_thumbv4t_none_eabi = "arm-none-eabi-gcc"

AR_armv7r_none_eabihf = "arm-none-eabi-ar"
